; M5Stack Atom EchoS3R (Atom VoiceS3R, SKU C126-ECHO)
; MCU: ESP32-S3-PICO-1-N8R8 (Flash 8MB quad / PSRAM 8MB octal)
[env:atom_echos3r]
platform = espressif32@6.13.0
board = esp32-s3-devkitc-1
framework = arduino
; N8R8: PSRAMがoctalのためqio_opi。既定のqio_qspiだとPSRAM認識に失敗する
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
; Arduino-ESP32 2.0.17の既定C++11を外し、nativeテスト環境とC++17へ統一する
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    ; USB-OTG(TinyUSB)を使用（PC側はUSB CDC経由で通信する）。
    ; MODE=1（内蔵HW CDC/JTAG=usb_serial_jtag）はhost→deviceのバルク受信が遅く、
    ; 大きな0x03（音声、最大1.44MB）を受信できなかったためMODE=0へ切替（2026-07-12）。
    ; さらにコアのUSBCDCクラスも受信を1バイトずつFreeRTOSキューに通すため約44KB/sで頭打ちになる
    ; （docs/issue_usb_throughput.md）。CDC_ON_BOOT=0としてUSBCDC（Serial）を一切リンクせず、
    ; serial_link.cppの独自CDC（TinyUSB直接・FIFO一括読み）を使う。CDC_ON_BOOT=1に戻すと
    ; USBCDC.oのtud_cdc_*コールバックと二重定義になりリンクエラーとなるので注意。
    ; 書き込みはリセットボタン2秒長押しでダウンロードモードに入れてから行う（docs/how_to_setup_fw.md）。
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
; レジストリのミラー(contabostorage)がウィルス対策ソフトに遮断されるため、
; ライブラリはGitHubリリースから直接取得する。M5GFXはM5Unifiedの依存で、
; 先に列挙することでレジストリからの自動解決を回避する
lib_deps =
    https://github.com/m5stack/M5GFX/archive/refs/tags/0.2.25.zip
    https://github.com/m5stack/M5Unified/archive/refs/tags/0.2.18.zip
    https://github.com/adafruit/Adafruit_NeoPixel/archive/refs/tags/1.15.5.zip
build_src_filter = +<*> -<stress_main.cpp>
monitor_speed = 115200

; task8のUSB TX停止問題（末尾スタック）調査用ストレステストFW（docs/task8_verification.md G）。
; アプリの main.cpp を stress_main.cpp（PC要求駆動でパケット送信・echoを反復する）に
; 差し替えただけで、ビルド設定・serial_link等は本番と同一。相手は scripts/task8_txstress.py
[env:atom_echos3r_txstress]
extends = env:atom_echos3r
build_src_filter = +<*> -<main.cpp>

; ハードウェア非依存ロジック（パケットパーサ等）のホスト側ユニットテスト用
[env:native]
platform = native@1.2.1
test_framework = unity
build_flags = -std=c++17
; テスト対象(src/のロジック)をテストバイナリへ含める。
; main.cpp / stress_main.cpp はArduino依存のためホストではビルドできず除外する
test_build_src = yes
build_src_filter = +<*> -<main.cpp> -<stress_main.cpp>
