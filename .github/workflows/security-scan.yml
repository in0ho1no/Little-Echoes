name: Security Scan

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build semgrep image
        run: docker build -t local-semgrep docker/semgrep/
      - name: Run semgrep
        run: |
          exclude_args=()
          while IFS= read -r -d '' md; do
            html="${md%.md}.html"
            if [ -f "$html" ]; then
              exclude_args+=(--exclude "$html")
            fi
          done < <(find . -type f -name '*.md' -print0)

          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            local-semgrep \
            semgrep scan --config p/default --metrics=off --error --quiet "${exclude_args[@]}" --json --output semgrep-results.json . || true
      - name: Check plaintext HTTP links in Markdown (allow localhost)
        run: |
          matches=$(grep -RInE --include='*.md' 'http://[^[:space:])>\"]+' . | grep -Ev 'http://(localhost|127\.0\.0\.1|\[::1\]|::1)([:/]|$)' || true)
          if [ -n "$matches" ]; then
            echo "Disallowed plaintext HTTP links found in Markdown:"
            echo "$matches"
            exit 1
          fi
      - name: Check semgrep results
        run: |
          if [ -f semgrep-results.json ]; then
            python3 -m json.tool semgrep-results.json
            # エラー数をカウント
            errors=$(python3 -c "import json; data=json.load(open('semgrep-results.json')); print(len(data.get('results', [])))")
            echo "Semgrep found $errors issues"
            if [ "$errors" -gt 0 ]; then
              exit 1
            fi
          else
            echo "No semgrep results file generated"
            exit 1
          fi
      - name: Upload semgrep report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-results
          path: semgrep-results.json
          if-no-files-found: warn

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Build gitleaks image
        run: docker build -t local-gitleaks docker/gitleaks/
      - name: Run gitleaks
        run: |
          # コンテナ内の root と runner のユーザーが異なるため、
          # safe.directory を渡さないと git が dubious ownership エラーになる
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/repo \
            local-gitleaks \
            detect --source . --no-banner --redact --report-format json --report-path gitleaks-results.json
      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-results
          path: gitleaks-results.json
          if-no-files-found: warn
